name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      incrementVersion:
        type: choice
        description: "increment version?"
        required: true
        default: 'none'
        options:
          - none
          - patch
          - minor
          - major
  schedule:
    # Midnight every day
    - cron: "0 0 * * *"
permissions:
  contents: write

jobs:
  release:
    name: Release build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: JDK Setup
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Gradle Setup
        uses: gradle/actions/setup-gradle@v5

      - name: Increment version
        if: inputs.incrementVersion != 'none' && inputs.incrementVersion != ''
        env:
          GRGIT_USER: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./gradlew incrementVersion --increment=${{inputs.incrementVersion}}
          ./gradlew pushTags
          latest_tag=$(git describe --tags --abbrev=0)
          echo "RELEASE_VERSION=$latest_tag" >> "$GITHUB_ENV"

      - name: Publish
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.PGP_SECRET }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.PGP_PASSPHRASE }}
        run: ./gradlew publish

      - name: Create release notes
        if: inputs.incrementVersion != 'none' && inputs.incrementVersion != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
        run: |
          gh release create "$RELEASE_VERSION" \
              --repo="$GITHUB_REPOSITORY" \
              --title="$RELEASE_VERSION" \
              --generate-notes \
              --draft

      - name: Announce release
        if: inputs.incrementVersion != 'none' && inputs.incrementVersion != ''
        run: |
          curl -X POST -H "Authorization: Bearer ${{ secrets.MASTODON_ACCESS_TOKEN }}" \
          -F "status=#Input4j version ${{ env.RELEASE_VERSION }} has just been released!
          #GameDev #indiedev #videogames #IndieGameDev
          ${{ github.server_url }}/${{ github.repository }}/releases/tag/$RELEASE_VERSION" \
          https://fosstodon.org/api/v1/statuses





