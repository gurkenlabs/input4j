<nav class="navbar">
  <div class="container">
    <a href="{{ '/' | relative_url }}" class="nav-brand">
      <img src="{{ '/assets/input4j_logo_x256.png' | relative_url }}" alt="input4j" class="nav-logo">
      <span class="logo-text">input<span class="logo-accent">4j</span></span>
    </a>
    
    <ul class="nav-menu">
      <li><a href="{{ '/' | relative_url }}" class="nav-link{% if page.url == '/' %} active{% endif %}">Home</a></li>
      <li><a href="{{ '/#quickstart' | relative_url }}" class="nav-link">Quick Start</a></li>
      <li><a href="{{ '/#features' | relative_url }}" class="nav-link">Features</a></li>
      <li><a href="{{ '/docs' | relative_url }}" class="nav-link">Docs</a></li>
      <li><a href="https://github.com/gurkenlabs/input4j" class="nav-link" target="_blank" rel="noopener">GitHub</a></li>
    </ul>
    
    <div class="nav-actions">
      <a href="https://github.com/gurkenlabs/input4j" class="btn btn-github" target="_blank" rel="noopener">
        <svg height="16" viewBox="0 0 16 16" width="16" fill="currentColor">
          <path d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.75.75 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25z"></path>
        </svg>
        <span id="star-count">Star</span>
      </a>
      <a href="https://opencollective.com/litiengine/projects/input4j" class="btn btn-sponsor" target="_blank" rel="noopener">Support input4j</a>
    </div>
  </div>
</nav>

<script>
document.addEventListener('DOMContentLoaded', function() {
  fetch('https://api.github.com/repos/gurkenlabs/input4j')
    .then(res => res.json())
    .then(data => {
      const starCount = document.getElementById('star-count');
      if (starCount && data.stargazers_count !== undefined) {
        starCount.textContent = data.stargazers_count;
      }
    })
    .catch(() => {});
});
</script>
