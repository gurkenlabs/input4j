<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>{% if page.title %}{{ page.title }} - input4j{% else %}input4j - Java Gamepad & Controller Library{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">

  <!-- Open Graph -->
  <meta property="og:type" content="website">

  <meta property="og:image" content="{{ '/assets/input4j_logo.png' | absolute_url }}">
  <meta property="og:site_name" content="{{ site.title }}">
  
  <!-- Twitter -->
  <meta name="twitter:card" content="summary">

  <meta name="twitter:site" content="@gurkenlabs">
  <meta name="twitter:creator" content="@gurkenlabs">

  <!-- Syntax Highlighting -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-twilight.min.css" rel="stylesheet">
